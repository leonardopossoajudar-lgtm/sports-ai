<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --primary: #00ff00; --bg: #000000; --card: #151515; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; width: 280px; text-align: center; border: 1px solid #444; display: none; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--primary); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }
        .links { margin-top: 10px; font-size: 12px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="telaLogin" class="box" style="display: block;">
    <h2>LOGIN</h2>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="logar()">ENTRAR</button>
    <p class="links" onclick="trocar('telaCadastro')">Não tem conta? Cadastre-se</p>
</div>

<!-- TELA CADASTRO -->
<div id="telaCadastro" class="box">
    <h2>CADASTRO</h2>
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="email" id="emailC" placeholder="E-mail">
    <input type="password" id="senhaC" placeholder="Senha">
    <button onclick="cadastrar()">CADASTRAR</button>
    <p class="links" onclick="trocar('telaLogin')">Já tem conta? Voltar</p>
</div>

<!-- TELA PAINEL -->
<div id="telaPainel" class="box">
    <h2>Bem-vindo!</h2>
    <p>Acesso validado.</p>
    <button onclick="location.reload()">SAIR</button>
</div>

<script>
    function trocar(tela) {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('telaCadastro').style.display = 'none';
        document.getElementById('telaPainel').style.display = 'none';
        document.getElementById(tela).style.display = 'block';
    }
    
    function logar() {
        // Lógica de autenticação aqui
        trocar('telaPainel');
    }

    function cadastrar() {
        // Lógica de cadastro aqui
        trocar('telaLogin');
    }
</script>
</body>
</html>
